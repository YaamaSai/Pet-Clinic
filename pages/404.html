<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - PawPrints</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
            overflow-x: hidden;
            font-family: 'Outfit', sans-serif;
            transition: background-color 0.3s ease;
        }

        .page-404-wrapper {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 2rem;
        }

        /* Beautiful purple wave background on the right */
        .wave-bg {
            position: absolute;
            top: 0;
            right: 0;
            width: 65%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: linear-gradient(135deg, #F8F5FF 0%, #E8D4FF 100%);
            clip-path: ellipse(80% 100% at 100% 50%);
            transition: background 0.3s ease;
        }

        /* Floating background icons */
        .bg-icon {
            position: absolute;
            color: #C6A8F0; /* Slightly deeper purple so it stands out more */
            z-index: 0;
            animation: float-icon 8s ease-in-out infinite alternate;
        }
        @keyframes float-icon {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(15deg); }
        }

        .container-404 {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            width: 100%;
            gap: 2rem;
        }

        /* Left Content: Center Aligned */
        .left-content {
            flex: 1;
            max-width: 500px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .huge-404 {
            font-size: 10rem;
            font-weight: 900;
            color: #A382D6;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin: 0 0 0.5rem 0;
            line-height: 1;
        }

        .title-404 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1F2937;
            margin: 0 0 1rem 0;
            transition: color 0.3s ease;
        }

        .text-404 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #9D74C5;
            line-height: 1.6;
            margin-bottom: 2rem;
            max-width: 600px;
            transition: color 0.3s ease;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn-group a {
            border-radius: 100px;
            padding: 0.8rem 1.8rem;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: #6D28D9;
            color: white;
            box-shadow: 0 10px 20px rgba(109, 40, 217, 0.2);
        }

        .btn-primary:hover {
            background: #5B21B6;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: #6D28D9;
            border: 2px solid #6D28D9;
        }

        .btn-outline:hover {
            background: rgba(109, 40, 217, 0.05);
            transform: translateY(-2px);
        }

        /* Dotted line & plane */
        .flight-path {
            position: absolute;
            right: -100px;
            top: 50%;
            width: 150px;
            height: 50px;
            pointer-events: none;
        }

        /* Right Content */
        .right-content {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dog-image {
            width: 100%;
            max-width: 450px;
            z-index: 2;
            mix-blend-mode: multiply;
            border-radius: 2rem;
        }

        .floating-sign {
            position: absolute;
            right: -5%;
            top: 20%;
            background: transparent;
            font-weight: 600;
            font-size: 1rem;
            text-align: center;
            animation: float-sign 5s ease-in-out infinite;
            z-index: 10;
        }

        .floating-sign::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 100px;
            background: linear-gradient(to bottom, #7E56A6, #67428B);
            z-index: -1;
            border-radius: 4px;
        }

        /* Three boards for the sign */
        .sign-board {
            display: block;
            background: #9D74C5;
            color: white;
            padding: 0.5rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 0.3rem;
            position: relative;
            clip-path: polygon(0% 0%, 90% 0%, 100% 50%, 90% 100%, 0% 100%);
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }

        @keyframes float-sign {
            0% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0) rotate(-2deg); }
        }

        /* Top Bar styling */
        .top-brand {
            position: absolute;
            top: 2rem;
            left: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 20;
            text-decoration: none;
        }
        
        .brand-text {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1F2937;
            line-height: 1;
            transition: color 0.3s ease;
        }

        @media (max-width: 992px) {
            .page-404-wrapper {
                padding-top: 7rem;
            }
            .container-404 {
                flex-direction: column;
                text-align: center;
                gap: 4rem;
            }
            .flight-path { display: none; }
            .wave-bg { width: 100%; clip-path: ellipse(150% 100% at 50% 100%); bottom: 0; top: auto; height: 60%; }
            .floating-sign { right: 10%; top: 10%; }
            .huge-404 { font-size: 7rem; }
            .huge-404 i { font-size: 5.5rem !important; }
        }

        @media (max-width: 480px) {
            .page-404-wrapper {
                padding-top: 5rem;
            }
            .top-brand { top: 1rem; left: 1rem; }
            .top-brand i { font-size: 2rem !important; }
            .brand-text { font-size: 1.2rem; }
            .top-brand div > div:last-child { font-size: 0.8rem !important; }
            .toggle-pill { right: 1rem !important; top: 1rem !important; }
            .huge-404 { font-size: 5rem; }
            .huge-404 i { font-size: 4rem !important; }
        }

        /* =========================================
           DARK MODE OVERRIDES (Triggered by main.js)
           ========================================= */
        html[data-theme="dark"] body {
            background-color: #0F172A;
        }
        html[data-theme="dark"] .wave-bg {
            background: linear-gradient(135deg, #1E1B4B 0%, #312E81 100%);
        }
        html[data-theme="dark"] .bg-icon {
            color: #312E81;
        }
        html[data-theme="dark"] .huge-404 {
            color: #E8D4FF; /* Light purple in dark mode to ensure perfect visibility */
        }
        html[data-theme="dark"] .title-404,
        html[data-theme="dark"] .brand-text {
            color: #F8FAFC;
        }
        html[data-theme="dark"] .text-404 {
            color: #CBD5E1;
        }
        html[data-theme="dark"] .dog-image {
            mix-blend-mode: normal; /* Removes the multiply blend on dark backgrounds */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            background: #F8F5FF; /* Solidifies the background so it looks like a photo frame */
            border-radius: 2rem;
            border: 4px solid #312E81;
        }
        html[data-theme="dark"] .btn-outline {
            color: #A88DEB;
            border-color: #A88DEB;
        }
        html[data-theme="dark"] .btn-outline:hover {
            background: rgba(168, 141, 235, 0.1);
        }
        html[data-theme="dark"] .flight-path path {
            stroke: #312E81 !important;
        }

        /* =========================================
           RTL OVERRIDES
           ========================================= */
        html[dir="rtl"] .top-brand {
            left: auto;
            right: 2rem;
        }
        html[dir="rtl"] .toggle-pill {
            right: auto !important;
            left: 2rem !important;
        }
        html[dir="rtl"] .floating-sign {
            right: auto;
            left: -5%;
        }

        @media (max-width: 992px) {
            html[dir="rtl"] .floating-sign {
                right: auto;
                left: 10%;
            }
        }

        @media (max-width: 480px) {
            html[dir="rtl"] .top-brand {
                left: auto;
                right: 1rem;
            }
            html[dir="rtl"] .toggle-pill {
                right: auto !important;
                left: 1rem !important;
            }
        }
    </style>
    <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>

    <div class="page-404-wrapper">
        <!-- Exact Purple Wave Background -->
        <div class="wave-bg"></div>

        <!-- Decorative background icons (Brighter and more of them) -->
        <i class="ph-fill ph-paw-print bg-icon" style="top: 15%; left: 8%; font-size: 2.5rem; opacity: 0.8; animation-delay: 0s;"></i>
        <i class="ph-fill ph-bone bg-icon" style="bottom: 25%; left: 12%; font-size: 1.8rem; opacity: 0.7; animation-delay: 2s; transform: rotate(15deg);"></i>
        <i class="ph-fill ph-paw-print bg-icon" style="top: 10%; right: 45%; font-size: 3rem; opacity: 0.85; animation-delay: 1s; transform: rotate(-10deg);"></i>
        <i class="ph-fill ph-paw-print bg-icon" style="bottom: 15%; right: 15%; font-size: 2.2rem; opacity: 0.75; animation-delay: 3s; transform: rotate(20deg);"></i>
        <i class="ph-fill ph-bone bg-icon" style="top: 40%; left: 2%; font-size: 1.5rem; opacity: 0.6; animation-delay: 4s; transform: rotate(-25deg);"></i>
        <i class="ph-fill ph-paw-print bg-icon" style="top: 60%; right: 55%; font-size: 2rem; opacity: 0.7; animation-delay: 5s;"></i>
        <i class="ph-fill ph-bone bg-icon" style="top: 5%; left: 35%; font-size: 1.2rem; opacity: 0.6; animation-delay: 1.5s; transform: rotate(45deg);"></i>
        <i class="ph-fill ph-paw-print bg-icon" style="bottom: 5%; left: 45%; font-size: 1.8rem; opacity: 0.8; animation-delay: 2.5s; transform: rotate(-15deg);"></i>

        <!-- Logo Top Left -->
        <a href="index.html" class="top-brand">
            <i class="ph-fill ph-paw-print" style="font-size: 2.5rem; color: #6D28D9;"></i>
            <div>
                <div class="brand-text">PawPrints</div>
                <div style="color: #6D28D9; font-weight: 500; font-size: 0.9rem;">Veterinary</div>
            </div>
        </a>

        <!-- Absolute Top-Right Toggle Pill -->
        <div class="toggle-pill" style="position: absolute; right: 2rem; top: 2rem; z-index: 100; display: flex; align-items: center; background: rgba(109, 40, 217, 0.08); border-radius: 100px; padding: 0.25rem; border: 1px solid rgba(109, 40, 217, 0.15);">
            <button id="theme-toggle" class="top-toggle-btn" aria-label="Toggle Dark Mode" style="background: transparent; border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #6D28D9; transition: all 0.3s ease;">
                <i class="ph-bold ph-moon" style="font-size: 1.1rem;"></i>
            </button>
            <div style="width: 1px; height: 20px; background: rgba(109, 40, 217, 0.2); margin: 0 0.25rem;"></div>
            <button id="rtl-toggle" class="top-toggle-btn" aria-label="Toggle RTL" style="background: transparent; border: none; height: 36px; padding: 0 0.75rem; border-radius: 100px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #6D28D9; font-size: 0.85rem; font-weight: 800; letter-spacing: 0.5px; transition: all 0.3s ease;">
                RTL
            </button>
        </div>

        <div class="container-404">
            <div class="left-content">
                <h1 class="huge-404">
                    4<i class="ph-fill ph-paw-print" style="color: #F472B6; font-size: 7.5rem;"></i>4
                </h1>
                <h2 class="title-404">Oops! Page Not Found</h2>
                <p class="text-404">
                    The page you're looking for seems to have wandered <br> off.
                </p>

                <!-- Paper Plane Flight Path -->
                <div class="flight-path">
                    <svg viewBox="0 0 150 50" style="width: 100%; height: 100%; overflow: visible;">
                        <path d="M 0 50 Q 75 0 150 25" fill="none" stroke="#E8D4FF" stroke-width="2" stroke-dasharray="6,6" style="transition: stroke 0.3s ease;" />
                        <g transform="translate(150, 25) rotate(15)">
                            <i class="ph-fill ph-paper-plane-tilt" style="color: #F472B6; font-size: 1.5rem; position: absolute; top: -12px; left: -12px;"></i>
                        </g>
                    </svg>
                </div>
            </div>

            <div class="right-content">
                <div class="floating-sign">
                    <div class="sign-board">Looks like</div>
                    <div class="sign-board">you took a</div>
                    <div class="sign-board">wrong turn</div>
                </div>
                <img src="../assets/images/404_dog.png" alt="Lost Dog" class="dog-image">
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/mobile-nav.js"></script>
</body>
</html>
