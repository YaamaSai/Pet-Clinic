<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - PawPrints</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        :root {
            --cs-bg: linear-gradient(135deg, #FDF4FF, #F3E8FF);
            --cs-text: #1F2937;
            --cs-sub-text: #8B5CF6;
            --cs-p-text: #4B5563;
            --cs-btn-bg: rgba(139, 92, 246, 0.1);
            --cs-btn-hover: rgba(139, 92, 246, 0.2);
            --cs-border: white;
            --cs-accent: #8B5CF6;
            --cs-stars-op: 0.8;
            --cs-stars-filter: invert(1);
            --cs-form-bg: white;
            --cs-input-text: #1F2937;
            --cs-badge-bg: rgba(255, 255, 255, 0.8);
            --cs-badge-border: rgba(139, 92, 246, 0.2);
            --cs-glass-bg: rgba(255, 255, 255, 0.6);
            --cs-glass-border: rgba(255, 255, 255, 0.8);
            --cs-glass-border-t: rgba(255, 255, 255, 1);
            --cs-glass-shadow: 0 40px 80px rgba(139, 92, 246, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.8);
            --cs-time-bg: rgba(255, 255, 255, 0.8);
            --cs-time-border: rgba(255, 255, 255, 1);
            --cs-time-shadow: inset 0 2px 10px rgba(255, 255, 255, 1);
            --cs-time-hover: rgba(255, 255, 255, 1);
            --cs-time-num: #1F2937;
            --cs-time-shadow-text: 0 0 15px rgba(255, 255, 255, 0.8);
            --cs-smoke: radial-gradient(circle, rgba(244, 114, 182, 0.3) 0%, rgba(139, 92, 246, 0.2) 40%, transparent 70%);
            --cs-wave-fill: #FFFFFF;
        }

        [data-theme="dark"] {
            --cs-bg: linear-gradient(135deg, #2D1B69, #1C1242);
            --cs-text: #FFFFFF;
            --cs-sub-text: #E8D4FF;
            --cs-p-text: #D1D5DB;
            --cs-btn-bg: rgba(255, 255, 255, 0.1);
            --cs-btn-hover: rgba(255, 255, 255, 0.2);
            --cs-border: white;
            --cs-accent: #8B5CF6;
            --cs-stars-op: 0.4;
            --cs-stars-filter: none;
            --cs-form-bg: white;
            --cs-input-text: #1F2937;
            --cs-badge-bg: rgba(255, 255, 255, 0.08);
            --cs-badge-border: rgba(255, 255, 255, 0.1);
            --cs-glass-bg: rgba(20, 10, 45, 0.5);
            --cs-glass-border: rgba(255, 255, 255, 0.1);
            --cs-glass-border-t: rgba(255, 255, 255, 0.25);
            --cs-glass-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.02);
            --cs-time-bg: rgba(0, 0, 0, 0.25);
            --cs-time-border: rgba(255, 255, 255, 0.08);
            --cs-time-shadow: inset 0 2px 10px rgba(255, 255, 255, 0.02);
            --cs-time-hover: rgba(255, 255, 255, 0.05);
            --cs-time-num: #FFFFFF;
            --cs-time-shadow-text: 0 0 15px rgba(255, 255, 255, 0.4);
            --cs-smoke: radial-gradient(circle, rgba(244, 114, 182, 0.5) 0%, rgba(139, 92, 246, 0.4) 40%, transparent 70%);
            --cs-wave-fill: #1C1242;
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--cs-bg);
            color: var(--cs-text);
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Navbar */
        .cs-navbar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 3rem 0 3rem;
            position: relative;
            z-index: 50;
        }

        .cs-nav-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .cs-nav-brand i {
            font-size: 2.2rem;
            color: var(--cs-text);
        }

        .cs-nav-brand .brand-text {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--cs-text);
            line-height: 1;
        }

        .cs-nav-brand .brand-sub {
            color: var(--cs-sub-text);
            font-weight: 500;
            font-size: 0.8rem;
        }

        .cs-nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .cs-nav-links a {
            color: var(--cs-text);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.2rem;
            transition: color 0.3s ease;
        }

        .cs-nav-links a:hover {
            color: var(--cs-accent);
        }

        .cs-nav-actions {
            display: flex;
            align-items: center;
            position: absolute;
            right: 3rem;
        }

        .cs-toggles-wrapper {
            display: flex;
            align-items: center;
            background: transparent;
            border: 1px solid var(--cs-badge-border);
            border-radius: 100px;
            padding: 0.2rem;
            gap: 0.2rem;
        }

        .cs-toggles-divider {
            width: 1px;
            height: 20px;
            background: var(--cs-badge-border);
            margin: 0 0.2rem;
        }

        .cs-theme-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--cs-text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cs-theme-btn:hover, .cs-rtl-btn:hover {
            background: var(--cs-btn-hover);
        }

        .cs-rtl-btn {
            height: 36px;
            padding: 0 0.8rem;
            border-radius: 100px;
            background: transparent;
            border: none;
            color: var(--cs-text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .cs-book-btn {
            background: white;
            color: #6D28D9;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .cs-book-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* Main Content Wrapper */
        .cs-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 3rem;
        }

        /* Stars Background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: var(--cs-stars-op);
            filter: var(--cs-stars-filter);
            z-index: 0;
            pointer-events: none;
        }

        [data-theme="dark"] .stars {
            animation: twinkle 5s infinite alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.3;
            }

            100% {
                opacity: 0.7;
            }
        }

        /* White Bottom Wave */
        .wave-bg {
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 120px;
            z-index: 10;
            pointer-events: none;
        }

        .container-cs {
            position: relative;
            z-index: 20;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
            max-width: 1100px;
            width: 100%;
            gap: 2rem;
        }

        /* Left Column */
        .cs-left {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .cs-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            width: fit-content;
        }

        .cs-title {
            font-size: 2.8rem;
            color: var(--cs-text);
            font-weight: 800;
            line-height: 1.2;
            margin: 0 0 1rem 0;
        }

        .cs-title span {
            color: var(--cs-accent);
        }

        .cs-text {
            font-size: 0.85rem;
            color: var(--cs-p-text);
            line-height: 1.6;
            margin-bottom: 1.5rem;
            max-width: 350px;
        }


        .social-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--cs-sub-text);
            margin-bottom: 0.8rem;
            text-align: center;
        }

        .social-icons {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            justify-content: center;
        }

        .social-icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            color: white;
            border-radius: 50%;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .social-icons a.fb {
            background: #1877F2;
        }

        .social-icons a.ig {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .social-icons a.tw {
            background: #1DA1F2;
        }

        .social-icons a.yt {
            background: #FF0000;
        }

        .social-icons a:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Center Column (Dog) */
        .cs-center {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 100%;
            min-height: 400px;
        }

        .cs-dog {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            max-width: 360px;
            border-radius: 50%;
            border: 8px solid var(--cs-border);
            box-shadow: 0 0 0 15px var(--cs-accent);
            z-index: 20;
            animation: breathe 6s ease-in-out infinite alternate;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.4));
            background-color: var(--cs-border);
        }

        @keyframes breathe {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                transform: translate(-50%, calc(-50% - 10px)) scale(1.02);
            }
        }

        /* Right Column (Card) */
        .cs-right {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .cs-glass-card {
            background: var(--cs-glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--cs-glass-border);
            border-top: 1px solid var(--cs-glass-border-t);
            border-left: 1px solid var(--cs-glass-border);
            border-radius: 2rem;
            padding: 2.5rem 1.5rem;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: var(--cs-glass-shadow);
            position: relative;
            overflow: hidden;
            transform: translateY(-50px);
        }

        .cs-glass-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent 0%, rgba(244, 114, 182, 0.1) 25%, transparent 50%, rgba(139, 92, 246, 0.1) 75%, transparent 100%);
            animation: rotate-gradient 10s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes rotate-gradient {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ensure content is above the rotating gradient */
        .cs-glass-card > * {
            position: relative;
            z-index: 10;
        }

        .timer-title {
            font-weight: 700;
            color: var(--cs-text);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            margin-bottom: 2rem;
            display: inline-block;
            background: var(--cs-badge-bg);
            padding: 0.4rem 1.2rem;
            border-radius: 100px;
            border: 1px solid var(--cs-badge-border);
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            position: relative;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--cs-time-bg);
            border: 1px solid var(--cs-time-border);
            border-radius: 0.8rem;
            padding: 0.8rem 0.2rem;
            box-shadow: var(--cs-time-shadow);
            transition: all 0.3s ease;
        }

        .time-box:hover {
            background: var(--cs-time-hover);
            transform: translateY(-2px);
        }

        .time-box span:first-child {
            font-size: 1.6rem;
            font-weight: 900;
            line-height: 1;
            color: var(--cs-time-num);
            margin-bottom: 0.4rem;
            text-shadow: var(--cs-time-shadow-text);
        }

        .time-box span:last-child {
            font-size: 0.65rem;
            color: var(--cs-accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }


        @media (max-width: 1100px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
            }

            .cs-navbar {
                justify-content: space-between;
                padding: 1rem 1.5rem 0 1.5rem;
            }

            .cs-nav-actions {
                position: static;
            }

            .cs-wrapper {
                padding: 0.5rem 1rem 1rem 1rem;
            }

            .container-cs {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 0.5rem;
            }

            .cs-center {
                height: auto;
                order: -1;
                margin-top: 0;
            }

            .cs-center::before {
                width: 350px;
                height: 350px;
            }

            .cs-dog {
                position: relative;
                top: 0;
                left: 0;
                width: 60%;
                margin: 0 auto;
                animation: breathe-mobile 6s ease-in-out infinite alternate;
            }

            .cs-right {
                justify-content: center;
            }


            .social-icons {
                justify-content: center;
            }

            .cs-left {
                order: 2;
            }

            .cs-right {
                order: 3;
            }
        }

        @keyframes breathe-mobile {
            0% {
                transform: translateY(0) scale(1);
            }
            100% {
                transform: translateY(-10px) scale(1.02);
            }
        }
    </style>
    <link rel="stylesheet" href="../assets/css/responsive.css">
</head>

<body>

    <!-- Top Navbar exactly like the image -->
    <nav class="cs-navbar">
        <a href="index.html" class="cs-nav-brand">
            <i class="ph-fill ph-paw-print"></i>
            <div>
                <div class="brand-text">PawPrints</div>
                <div class="brand-sub">Veterinary</div>
            </div>
        </a>
        <div class="cs-nav-actions">
            <div class="cs-toggles-wrapper">
                <button id="theme-toggle" class="top-toggle-btn cs-theme-btn" aria-label="Toggle Theme">
                    <i class="ph-bold ph-moon"></i>
                </button>
                <div class="cs-toggles-divider"></div>
                <button id="rtl-toggle" class="top-toggle-btn cs-rtl-btn" aria-label="Toggle RTL">
                    RTL
                </button>
            </div>
        </div>
    </nav>

    <div class="cs-wrapper">
        <div class="stars"></div>

        <!-- White Bottom Wave -->
        <svg class="wave-bg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="var(--cs-wave-fill)" fill-opacity="1"
                d="M0,224L60,202.7C120,181,240,139,360,144C480,149,600,203,720,208C840,213,960,171,1080,149.3C1200,128,1320,128,1380,128L1440,128L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z">
            </path>
            <path fill="var(--cs-bg)" fill-opacity="1"
                d="M0,160L48,165.3C96,171,192,181,288,165.3C384,149,480,107,576,101.3C672,96,768,128,864,154.7C960,181,1056,203,1152,181.3C1248,160,1344,96,1392,64L1440,32L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z">
            </path>
        </svg>

        <div class="container-cs">
            <!-- Left Column -->
            <div class="cs-left">
                <div class="cs-badge">
                    <i class="ph-fill ph-paw-print"></i> Something Pawsome is Coming Soon!
                </div>
                <h1 class="cs-title">We're Building Something Amazing for You and Your <span>Furry Friend!</span></h1>
                <p class="cs-text">
                    We're building an amazing experience for you and your pets.
                </p>

            </div>

            <!-- Center Column -->
            <div class="cs-center">
                <!-- Dog sits here, over the white wave -->
                <img src="../assets/images/coming_soon_dog.png" alt="Cool Dog" class="cs-dog">
            </div>

            <!-- Right Column -->
            <div class="cs-right">
                <div class="cs-glass-card">
                    <div class="timer-title">Launching in</div>
                    <div class="timer-grid">
                        <div class="time-box">
                            <span id="cs-days">12</span>
                            <span>DAYS</span>
                        </div>
                        <div class="time-box">
                            <span id="cs-hours">08</span>
                            <span>HOURS</span>
                        </div>
                        <div class="time-box">
                            <span id="cs-minutes">34</span>
                            <span>MINUTES</span>
                        </div>
                        <div class="time-box">
                            <span id="cs-seconds">56</span>
                            <span>SECONDS</span>
                        </div>
                    </div>

                    <div class="social-section" style="margin-top: 1.5rem;">
                        <div class="social-label">Follow us for updates</div>
                        <div class="social-icons">
                            <a href="#" class="fb"><i class="ph-fill ph-facebook-logo"></i></a>
                            <a href="#" class="ig"><i class="ph-fill ph-instagram-logo"></i></a>
                            <a href="#" class="tw"><i class="ph-fill ph-twitter-logo"></i></a>
                            <a href="#" class="yt"><i class="ph-fill ph-youtube-logo"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/mobile-nav.js"></script>
    <script>
        // Countdown Timer Logic
        const countdownDate = new Date();
        countdownDate.setDate(countdownDate.getDate() + 12);
        countdownDate.setHours(countdownDate.getHours() + 8);
        countdownDate.setMinutes(countdownDate.getMinutes() + 34);
        countdownDate.setSeconds(countdownDate.getSeconds() + 56);

        function updateTimer() {
            const now = new Date().getTime();
            const distance = countdownDate.getTime() - now;

            if (distance < 0) return;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("cs-days").innerText = days.toString().padStart(2, '0');
            document.getElementById("cs-hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("cs-minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("cs-seconds").innerText = seconds.toString().padStart(2, '0');
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>

</html>
