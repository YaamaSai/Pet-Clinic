<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - PawPrints</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
</head>

<body>

    <!-- Hero Card wrapper triggers particle animation -->
    <div class="hero-card"
        style="border-radius: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 0;">

        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-logo" style="position: relative;">
                    <a href="index.html" class="logo" style="justify-content: center; text-decoration: none;">
                        <i class="ph-fill ph-paw-print logo-icon"></i>
                        <div class="logo-text" style="text-align: left;">
                            <span class="logo-title">PawPrints</span>
                            <span class="logo-subtitle" style="color: var(--primary-color);">Veterinary</span>
                        </div>
                    </a>
                    
                    <!-- Small Toggles Right Aligned -->
                    <div class="auth-toggles-container" style="position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; align-items: center; background: rgba(140, 108, 201, 0.08); border-radius: 100px; padding: 0.25rem; border: 1px solid rgba(140, 108, 201, 0.15);">
                        <button id="theme-toggle" class="top-toggle-btn" aria-label="Toggle Dark Mode" style="background: transparent; border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--primary-color); transition: all 0.3s ease;">
                            <i class="ph-bold ph-moon" style="font-size: 1.1rem;"></i>
                        </button>
                        <div class="auth-toggles-divider" style="width: 1px; height: 20px; background: rgba(140, 108, 201, 0.2); margin: 0 0.25rem;"></div>
                        <button id="rtl-toggle" class="top-toggle-btn" aria-label="Toggle RTL" style="background: transparent; border: none; height: 36px; padding: 0 0.75rem; border-radius: 100px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--primary-color); font-size: 0.85rem; font-weight: 800; letter-spacing: 0.5px; transition: all 0.3s ease;">
                            RTL
                        </button>
                    </div>
                </div>

                <h2>Reset Password</h2>
                <p>Enter your email and we'll send you a link to reset your password.</p>

                <form id="resetForm" class="auth-form" action="#" style="margin-top: 1.5rem;">
                    <div class="auth-input-group">
                        <label>Email Address</label>
                        <input type="email" class="auth-input" placeholder="hello@example.com" required>
                    </div>

                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; margin-top: 1rem; font-size: 1.1rem;">Send Reset Link</button>
                </form>

                <div id="successMessage" style="display: none; background-color: rgba(140, 108, 201, 0.1); color: var(--primary-dark); padding: 1.5rem; border-radius: var(--radius-md); border: 1px solid var(--primary-light); margin-top: 1.5rem;">
                    <i class="ph-fill ph-check-circle" style="font-size: 2.5rem; color: var(--primary-color); margin-bottom: 0.5rem;"></i>
                    <h3 style="margin-bottom: 0.25rem; font-size: 1.5rem;">Reset Link Sent!</h3>
                    <p style="margin-bottom: 0; font-size: 1.1rem; color: var(--text-dark);">Please check your email for instructions to reset your password.</p>
                </div>

                <div class="auth-footer" style="margin-top: 2rem;">
                    <a href="login.html" class="auth-link"
                        style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                        <i class="ph ph-arrow-left"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/main.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Hide the form and the introductory text
            this.style.display = 'none';
            document.querySelector('.auth-card > p').style.display = 'none';
            
            // Show the success message
            document.getElementById('successMessage').style.display = 'block';
        });
    </script>
    <script src="../assets/js/mobile-nav.js"></script>
</body>

</html>
